<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namal — Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111111; --surface: #1A1A1A; --text: #E8E4DC;
    --muted: #6E6A62; --border: #2A2A2A; --accent: #C8A96E;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  nav {
    max-width: 1000px; margin: 0 auto; padding: 36px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color 0.15s; }
  .nav-links a:hover { color: var(--accent); }

  .hero { max-width: 1000px; margin: 0 auto; padding: 64px 32px 52px; border-bottom: 1px solid var(--border); }
  .hero-label { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 4vw, 48px); font-weight: 400; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 16px; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { font-size: 15px; color: var(--muted); max-width: 480px; line-height: 1.8; font-weight: 300; }

  .posts-section { max-width: 1000px; margin: 0 auto; padding: 52px 32px 80px; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; }

  .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2px; }

  .post-card {
    background: var(--surface);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: background 0.15s;
  }
  .post-card:hover { background: #202020; }
  .post-card img { width: 100%; height: 200px; object-fit: cover; display: block; filter: brightness(0.9); }
  .post-card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .post-card-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .post-card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; line-height: 1.35; letter-spacing: -0.01em; margin-bottom: 10px; flex: 1; }
  .post-card-meta { font-size: 12px; color: var(--muted); font-weight: 300; margin-top: 16px; }

  .about-section { max-width: 1000px; margin: 0 auto; padding: 52px 32px 72px; border-top: 1px solid var(--border); }
  .about-section h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; letter-spacing: -0.01em; margin-bottom: 20px; }
  .about-section h2 em { font-style: italic; color: var(--accent); }
  .about-section p { font-size: 15px; color: var(--muted); line-height: 1.85; font-weight: 300; max-width: 560px; margin-bottom: 16px; }
  .about-links { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 28px; }
  .about-links a { font-size: 13px; color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 1px; transition: opacity 0.15s; }
  .about-links a:hover { opacity: 0.6; }

  footer { max-width: 1000px; margin: 0 auto; padding: 24px 32px 48px; border-top: 1px solid var(--border); }
  footer p { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Namal</a>
  <ul class="nav-links">
    <li><a href="#posts">Writing</a></li>
    <li><a href="#about">About</a></li>
  </ul>
</nav>

<div class="hero">
  <p class="hero-label">Blog</p>
  <h1>Notes on ML, <em>motorsport,</em><br>and building things.</h1>
  <p>I write about machine learning, the honest side of job searching, F1 strategy, and whatever else is on my mind.</p>
</div>

<section class="posts-section" id="posts">
  <p class="section-label">All posts</p>
  <div class="posts-grid">

    <!-- PASTE A NEW POST CARD HERE FOR EACH POST YOU WRITE -->
    <a href="posts/demo-post.html" class="post-card">
      <img src="posts/images/my-first-post.jpg" alt="Post cover image" />
      <div class="post-card-body">
        <p class="post-card-tag">Machine Learning</p>
        <p class="post-card-title">Your first post title goes here</p>
        <p class="post-card-meta">Jun 18, 2025 · 5 min read</p>
      </div>
    </a>

  </div>
</section>

<footer>
  <p>© 2025 Namal</p>
</footer>

</body>
</html>
