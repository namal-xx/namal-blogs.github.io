<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Namal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111111; --surface: #1A1A1A; --text: #E8E4DC;
    --muted: #6E6A62; --border: #2A2A2A; --accent: #C8A96E;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }

  nav {
    max-width: 1000px; margin: 0 auto; padding: 36px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); width: 100%;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color 0.15s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  .contact-wrap {
    max-width: 1000px; margin: 0 auto; padding: 80px 32px 100px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; flex: 1; width: 100%;
  }

  .contact-left { opacity: 0; transform: translateX(-40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .contact-left.visible { opacity: 1; transform: translateX(0); }

  .contact-heading {
    font-family: 'Playfair Display', serif;
    font-size: clamp(52px, 7vw, 88px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .contact-heading em { font-style: italic; color: var(--muted); display: block; }

  .contact-right { opacity: 0; transform: translateX(40px); transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s; }
  .contact-right.visible { opacity: 1; transform: translateX(0); }

  .contact-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 32px;
    display: flex; align-items: center; gap: 12px;
  }
  .contact-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .contact-link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: padding-left 0.25s ease, color 0.2s;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease, padding-left 0.25s ease, color 0.2s;
  }
  .contact-link.visible { opacity: 1; transform: translateY(0); }
  .contact-link:hover { padding-left: 12px; color: var(--accent); }
  .contact-link:hover .link-arrow { transform: translate(3px, -3px); }

  .link-name { font-size: 20px; font-weight: 400; letter-spacing: -0.01em; }
  .link-arrow {
    font-size: 18px; color: var(--accent);
    transition: transform 0.2s ease;
    display: inline-block;
  }

  footer { max-width: 1000px; margin: 0 auto; padding: 24px 32px 48px; border-top: 1px solid var(--border); width: 100%; }
  footer p { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Namal</a>
  <ul class="nav-links">
    <li><a href="index.html">Writing</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<div class="contact-wrap">
  <div class="contact-left">
    <h1 class="contact-heading">Let's<br><em>connect.</em></h1>
  </div>

  <div class="contact-right">
    <p class="contact-label">Get in touch</p>

    <a href="mailto:namalrizwan4@email.com" class="contact-link" style="transition-delay: 0.1s">
      <span class="link-name">Email</span>
      <span class="link-arrow">↗</span>
    </a>
    <a href="https://www.linkedin.com/in/namal-rizwan-39708a389/" class="contact-link" style="transition-delay: 0.2s">
      <span class="link-name">LinkedIn</span>
      <span class="link-arrow">↗</span>
    </a>
    <a href="https://github.com/namal-xx" class="contact-link" style="transition-delay: 0.3s">
      <span class="link-name">GitHub</span>
      <span class="link-arrow">↗</span>
    </a>
    <a href="https://medium.com/@namalrizwan4" class="contact-link" style="transition-delay: 0.4s">
      <span class="link-name">Medium</span>
      <span class="link-arrow">↗</span>
    </a>
  </div>
</div>

<footer>
  <p>© 2025 Namal</p>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.contact-left, .contact-right, .contact-link').forEach(el => observer.observe(el));
</script>
</body>
</html>
